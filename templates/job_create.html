<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <title>Create Job - myQS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/portal-theme.css') }}" />
  <script src="{{ url_for('static', filename='js/shared-theme.js') }}" defer></script>
</head>
<body>
  <h1>Create New Job</h1>
  <p><a href="{{ url_for('client_dashboard') }}">Back to dashboard</a></p>

  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}

  <form method="post" enctype="multipart/form-data" action="{{ url_for('create_job') }}">
    <input type="text" name="title" placeholder="Job title" required />
    <textarea name="description" placeholder="Job description"></textarea>
    <input type="file" name="task_file" required />
    <button type="submit">Post Job</button>
  </form>
</body>
</html>
