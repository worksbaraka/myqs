<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - myQS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/portal-theme.css') }}" />
  <script src="{{ url_for('static', filename='js/shared-theme.js') }}" defer></script>
</head>
<body>
  <h1>Login</h1>
  {% if info %}<p>{{ info }}</p>{% endif %}
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('login') }}">
    <input type="email" name="email" placeholder="Email" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
  <p>No account yet? <a href="{{ url_for('register') }}">Create one</a></p>
</body>
</html>
