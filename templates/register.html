<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <title>Register - myQS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/portal-theme.css') }}" />
  <script src="{{ url_for('static', filename='js/shared-theme.js') }}" defer></script>
</head>
<body>
  <h1>Create Account</h1>
  <p>QS applicants must submit details and pay a registration fee of {{ qs_registration_fee }}. Access is enabled after admin payment confirmation.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('register') }}">
    <input type="text" name="name" placeholder="Full name" required />
    <input type="email" name="email" placeholder="Email" required />
    <input type="password" name="password" placeholder="Password" required />
    <select name="role" id="role" required>
      <option value="client">Client</option>
      <option value="qs">QS</option>
      <option value="admin">Admin</option>
    </select>
    <div id="qs-fields" style="display:none;">
      <input type="text" name="phone" placeholder="Phone number (required for QS)" />
      <input type="text" name="location" placeholder="Location (city/country)" />
      <input type="text" name="qualification" placeholder="Qualification (e.g. BSc Quantity Surveying)" />
      <input type="number" min="0" name="experience_years" placeholder="Years of experience" />
      <input type="text" name="payment_reference" placeholder="Payment reference/transaction ID (required for QS)" />
    </div>
    <button type="submit">Register</button>
  </form>
  <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  <script>
    const roleSelect = document.getElementById("role");
    const qsFields = document.getElementById("qs-fields");

    function toggleQsFields() {
      const showQs = roleSelect.value === "qs";
      qsFields.style.display = showQs ? "block" : "none";
      qsFields.querySelectorAll("input").forEach((input) => {
        if (input.name === "phone" || input.name === "payment_reference") {
          input.required = showQs;
        } else {
          input.required = false;
        }
      });
    }

    roleSelect.addEventListener("change", toggleQsFields);
    toggleQsFields();
  </script>
</body>
</html>
